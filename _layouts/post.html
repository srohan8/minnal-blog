---
layout: default
---
<main class="post-page">
  <div class="container">
    <a href="{{ site.baseurl }}/" class="back-link">← All posts</a>
    <article>
      <header class="post-header">
        <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
</main>
